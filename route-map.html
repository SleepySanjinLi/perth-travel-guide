<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>西澳珀斯北线5日路线图 | Route Map</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&family=DM+Serif+Display&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0f172a;
            --surface: #1e293b;
            --surface2: #334155;
            --border: #475569;
            --text: #f1f5f9;
            --text-dim: #94a3b8;
            --accent-a: #38bdf8;
            --accent-a-bg: rgba(56,189,248,0.1);
            --accent-b: #a78bfa;
            --accent-b-bg: rgba(167,139,250,0.1);
            --gold: #fbbf24;
            --green: #34d399;
            --rose: #fb7185;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Noto Sans SC', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

        .hero { text-align: center; padding: 3rem 2rem 1.5rem; position: relative; }
        .hero::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 200px; background: radial-gradient(ellipse at 50% 0%, rgba(56,189,248,0.12) 0%, transparent 70%); pointer-events: none; }
        .hero h1 { font-family: 'DM Serif Display', serif; font-size: clamp(1.8rem, 4vw, 2.8rem); background: linear-gradient(135deg, var(--accent-a), var(--accent-b)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; margin-bottom: 0.4rem; }
        .hero p { color: var(--text-dim); font-size: 0.95rem; }

        .plan-tabs { display: flex; justify-content: center; gap: 0.75rem; margin: 1.5rem 0; flex-wrap: wrap; }
        .tab-btn { padding: 0.65rem 1.5rem; border-radius: 10px; border: 2px solid var(--border); background: var(--surface); color: var(--text); font-size: 0.9rem; font-weight: 500; cursor: pointer; transition: all 0.3s; }
        .tab-btn:hover { border-color: var(--accent-a); }
        .tab-btn.active { border-color: var(--gold); color: var(--bg); font-weight: 700; }
        .tab-btn.active[data-plan="a"] { background: linear-gradient(135deg, #0284c7, #38bdf8); border-color: var(--accent-a); }
        .tab-btn.active[data-plan="b"] { background: linear-gradient(135deg, #7c3aed, #a78bfa); border-color: var(--accent-b); }
        .tab-btn.active[data-plan="both"] { background: linear-gradient(135deg, #0284c7, #7c3aed); border-color: var(--gold); }

        .main-container { max-width: 900px; margin: 0 auto; padding: 0 1.5rem 4rem; }

        /* ===== ROUTE MAP - Vertical Timeline ===== */
        .route-map { position: relative; margin: 2rem 0; }
        .route-line { position: absolute; left: 28px; top: 0; bottom: 0; width: 3px; background: var(--border); border-radius: 2px; }
        .route-progress { position: absolute; left: 28px; top: 0; width: 3px; border-radius: 2px; transition: height 0.6s ease; }
        .route-progress.plan-a { background: linear-gradient(to bottom, var(--accent-a), var(--green)); }
        .route-progress.plan-b { background: linear-gradient(to bottom, var(--accent-b), var(--rose)); }

        .day-node { position: relative; padding-left: 70px; margin-bottom: 2rem; }
        .day-dot { position: absolute; left: 18px; top: 4px; width: 22px; height: 22px; border-radius: 50%; border: 3px solid var(--border); background: var(--bg); z-index: 2; transition: all 0.3s; }
        .day-node.common .day-dot { border-color: var(--accent-a); background: var(--accent-a); }
        .day-node.plan-a-only .day-dot { border-color: var(--accent-a); background: var(--accent-a); }
        .day-node.plan-b-only .day-dot { border-color: var(--accent-b); background: var(--accent-b); }
        .day-node.split .day-dot { border-color: var(--gold); background: var(--gold); }

        .day-label { font-size: 0.75rem; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 0.3rem; }
        .day-node.common .day-label { color: var(--accent-a); }
        .day-node.plan-a-only .day-label { color: var(--accent-a); }
        .day-node.plan-b-only .day-label { color: var(--accent-b); }
        .day-node.split .day-label { color: var(--gold); }

        .day-card { background: var(--surface); border-radius: 14px; padding: 1.25rem; border: 1px solid var(--border); transition: all 0.3s; }
        .day-card:hover { border-color: var(--border); box-shadow: 0 8px 30px rgba(0,0,0,0.2); }
        .day-card h3 { font-size: 1.05rem; margin-bottom: 0.6rem; }
        .day-card .route-path { font-size: 0.85rem; color: var(--text-dim); margin-bottom: 0.6rem; display: flex; align-items: center; gap: 0.4rem; flex-wrap: wrap; }
        .day-card .route-path .arrow { color: var(--gold); }
        .day-card .stats { display: flex; gap: 1rem; margin-bottom: 0.6rem; flex-wrap: wrap; }
        .day-card .stat { font-size: 0.8rem; color: var(--text-dim); display: flex; align-items: center; gap: 0.3rem; }
        .day-card .stat .val { color: var(--text); font-weight: 500; }
        .day-card .spots { display: flex; flex-wrap: wrap; gap: 0.35rem; margin-bottom: 0.5rem; }
        .day-card .spot-tag { background: var(--surface2); padding: 0.15rem 0.55rem; border-radius: 5px; font-size: 0.72rem; color: var(--text-dim); }
        .day-card .hotel-badge { display: inline-flex; align-items: center; gap: 0.3rem; background: rgba(52,211,153,0.12); color: var(--green); padding: 0.25rem 0.65rem; border-radius: 7px; font-size: 0.78rem; font-weight: 500; }

        /* Split day (Day4/5) - two columns */
        .split-cards { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
        .split-card { background: var(--surface); border-radius: 14px; padding: 1.25rem; border: 1px solid var(--border); }
        .split-card.plan-a { border-top: 3px solid var(--accent-a); }
        .split-card.plan-b { border-top: 3px solid var(--accent-b); }
        .split-card h4 { font-size: 0.85rem; margin-bottom: 0.5rem; }
        .split-card.plan-a h4 { color: var(--accent-a); }
        .split-card.plan-b h4 { color: var(--accent-b); }
        .split-card .route-path { font-size: 0.82rem; color: var(--text-dim); margin-bottom: 0.5rem; }
        .split-card .stat { font-size: 0.78rem; color: var(--text-dim); margin-bottom: 0.3rem; }
        .split-card .stat .val { color: var(--text); font-weight: 500; }
        .split-card .spots { display: flex; flex-wrap: wrap; gap: 0.3rem; margin-bottom: 0.4rem; }
        .split-card .spot-tag { background: var(--surface2); padding: 0.12rem 0.5rem; border-radius: 5px; font-size: 0.7rem; color: var(--text-dim); }
        .split-card .hotel-badge { display: inline-flex; align-items: center; gap: 0.25rem; background: rgba(52,211,153,0.12); color: var(--green); padding: 0.2rem 0.55rem; border-radius: 7px; font-size: 0.75rem; font-weight: 500; }

        /* Difference banner */
        .diff-banner { background: var(--surface); border: 1px dashed var(--gold); border-radius: 16px; padding: 1.5rem; margin-top: 2.5rem; }
        .diff-banner h4 { color: var(--gold); margin-bottom: 1rem; font-size: 1rem; text-align: center; }
        .diff-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 0.75rem; }
        .diff-item { background: var(--surface2); padding: 0.85rem; border-radius: 10px; }
        .diff-item .label { font-size: 0.72rem; color: var(--text-dim); margin-bottom: 0.35rem; }
        .diff-item .val { font-size: 0.82rem; font-weight: 500; }
        .diff-item .val.a { color: var(--accent-a); }
        .diff-item .val.b { color: var(--accent-b); }

        .hidden { display: none; }

        @media (max-width: 768px) {
            .split-cards { grid-template-columns: 1fr; }
            .diff-grid { grid-template-columns: 1fr; }
            .day-node { padding-left: 55px; }
            .route-line, .route-progress { left: 20px; }
            .day-dot { left: 10px; }
        }
    </style>
</head>
<body>
    <section class="hero">
        <h1>Perth North Coast 5-Day Route</h1>
        <p>西澳珀斯北线5日自驾路线图 · 方案A vs 方案B</p>
    </section>

    <div class="plan-tabs">
        <button class="tab-btn active" data-plan="both" onclick="showPlan('both', this)">双方案对比</button>
        <button class="tab-btn" data-plan="a" onclick="showPlan('a', this)">方案A 住兰斯林</button>
        <button class="tab-btn" data-plan="b" onclick="showPlan('b', this)">方案B 回珀斯Citywalk</button>
    </div>

    <div class="main-container">
        <div class="route-map" id="route-map">
            <div class="route-line"></div>
            <!-- Content rendered by JS -->
        </div>

        <div class="diff-banner" id="diff-banner">
            <h4>📊 方案A vs 方案B 核心差异</h4>
            <div class="diff-grid">
                <div class="diff-item">
                    <div class="label">Day4 车程</div>
                    <div class="val a">A: 275km / 3.5h</div>
                    <div class="val b">B: 420km / 5h</div>
                </div>
                <div class="diff-item">
                    <div class="label">Day5 车程</div>
                    <div class="val a">A: 120km / 1.5h</div>
                    <div class="val b">B: 15km / 25min</div>
                </div>
                <div class="diff-item">
                    <div class="label">Day5 体验</div>
                    <div class="val a">A: 白沙丘晨游</div>
                    <div class="val b">B: Citywalk+购物</div>
                </div>
                <div class="diff-item">
                    <div class="label">总里程</div>
                    <div class="val a">A: ~1,020km</div>
                    <div class="val b">B: ~1,130km</div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const commonDays = [
            {
                day: 1, title: '罗特内斯特岛全天玩',
                route: ['珀斯', '罗特内斯特岛'],
                km: '轮渡45min', time: '全天',
                hotel: '珀斯 CBD',
                spots: ['Quokka合影', '浮潜', '自行车环岛', '白沙滩']
            },
            {
                day: 2, title: '北线出发',
                route: ['珀斯', '凯维森动物园', '兰斯林白沙丘', '尖峰石阵', '塞万提斯'],
                km: '240km', time: '4h',
                hotel: '塞万提斯',
                spots: ['袋熊互动', '滑沙', '石阵日落', '夜观银河']
            },
            {
                day: 3, title: '海岸美食与粉红湖',
                route: ['塞万提斯', '朱里恩湾', '赫特泻湖粉红湖', '卡尔巴里'],
                km: '355km', time: '4.5h',
                hotel: '卡尔巴里',
                spots: ['龙虾工厂', '海狮共游', '粉红湖']
            }
        ];

        const day4 = {
            a: {
                title: '峡谷奇观 + 南下兰斯林',
                route: ['卡尔巴里', '国家公园', '兰斯林'],
                km: '305km', time: '4.5h',
                hotel: '兰斯林',
                spots: ["Nature's Window", 'Skywalk', '海岸红崖']
            },
            b: {
                title: '峡谷奇观 + 直达珀斯',
                route: ['卡尔巴里', '国家公园', '珀斯'],
                km: '460km', time: '6h',
                hotel: '珀斯',
                spots: ["Nature's Window", 'Skywalk', '海岸红崖']
            }
        };

        const day5 = {
            a: {
                title: '白沙丘晨游 + 轻松返程',
                route: ['兰斯林', '珀斯机场'],
                km: '120km', time: '1.5h',
                hotel: '—',
                spots: ['白沙丘晨游', '印度洋公路'],
                note: '14:30出发 → 16:00到机场 → 18:25航班'
            },
            b: {
                title: '珀斯 Citywalk',
                route: ['国王公园', '天鹅河', '弗里曼特尔', 'CBD购物', '机场'],
                km: '15km', time: '25min',
                hotel: '—',
                spots: ['国王公园', '天鹅河', 'Fremantle', 'Hay St购物'],
                note: '16:00出发 → 16:30到机场 → 18:25航班'
            }
        };

        let currentPlan = 'both';

        function showPlan(plan, btn) {
            currentPlan = plan;
            document.querySelectorAll('.tab-btn').forEach(b => { b.classList.remove('active'); });
            if (btn) btn.classList.add('active');
            render();
        }

        function render() {
            const map = document.getElementById('route-map');
            const banner = document.getElementById('diff-banner');
            let html = '<div class="route-line"></div>';

            // Common days (Day1-3)
            commonDays.forEach(d => {
                html += renderCommonDay(d);
            });

            // Split days (Day4-5)
            if (currentPlan === 'both') {
                html += renderSplitDay(4, day4, 'a');
                html += renderSplitDay(5, day5, 'b');
                banner.classList.remove('hidden');
            } else {
                const d = currentPlan === 'a' ? day4.a : day4.b;
                const e = currentPlan === 'a' ? day5.a : day5.b;
                html += renderSingleDay(4, d, currentPlan);
                html += renderSingleDay(5, e, currentPlan);
                banner.classList.add('hidden');
            }

            map.innerHTML = html;
        }

        function renderCommonDay(d) {
            return `
            <div class="day-node common">
                <div class="day-dot"></div>
                <div class="day-label">Day ${d.day}</div>
                <div class="day-card">
                    <h3>${d.title}</h3>
                    <div class="route-path">${d.route.join(' <span class="arrow">→</span> ')}</div>
                    <div class="stats">
                        <span class="stat">🚗 <span class="val">${d.km}</span></span>
                        <span class="stat">⏱️ <span class="val">${d.time}</span></span>
                    </div>
                    <div class="spots">${d.spots.map(s => `<span class="spot-tag">${s}</span>`).join('')}</div>
                    <span class="hotel-badge">🏨 ${d.hotel}</span>
                </div>
            </div>`;
        }

        function renderSplitDay(dayNum, data, side) {
            const a = data.a, b = data.b;
            const noteHtml = (d) => d.note ? `<div style="margin-top:0.5rem; font-size:0.75rem; color: var(--gold);">⏰ ${d.note}</div>` : '';
            return `
            <div class="day-node split">
                <div class="day-dot"></div>
                <div class="day-label">Day ${dayNum}</div>
                <div class="split-cards">
                    <div class="split-card plan-a">
                        <h4>方案A</h4>
                        <div class="route-path">${a.route.join(' <span class="arrow" style="color:var(--gold)">→</span> ')}</div>
                        <div class="stat">🚗 <span class="val">${a.km}</span> · ⏱️ <span class="val">${a.time}</span></div>
                        <div class="spots">${a.spots.map(s => `<span class="spot-tag">${s}</span>`).join('')}</div>
                        <span class="hotel-badge">🏨 ${a.hotel}</span>
                        ${noteHtml(a)}
                    </div>
                    <div class="split-card plan-b">
                        <h4>方案B</h4>
                        <div class="route-path">${b.route.join(' <span class="arrow" style="color:var(--gold)">→</span> ')}</div>
                        <div class="stat">🚗 <span class="val">${b.km}</span> · ⏱️ <span class="val">${b.time}</span></div>
                        <div class="spots">${b.spots.map(s => `<span class="spot-tag">${s}</span>`).join('')}</div>
                        <span class="hotel-badge">🏨 ${b.hotel}</span>
                        ${noteHtml(b)}
                    </div>
                </div>
            </div>`;
        }

        function renderSingleDay(dayNum, d, plan) {
            const cls = plan === 'a' ? 'plan-a-only' : 'plan-b-only';
            const noteHtml = d.note ? `<div style="margin-top:0.5rem; font-size:0.75rem; color: var(--gold);">⏰ ${d.note}</div>` : '';
            return `
            <div class="day-node ${cls}">
                <div class="day-dot"></div>
                <div class="day-label">Day ${dayNum}</div>
                <div class="day-card">
                    <h3>${d.title}</h3>
                    <div class="route-path">${d.route.join(' <span class="arrow">→</span> ')}</div>
                    <div class="stats">
                        <span class="stat">🚗 <span class="val">${d.km}</span></span>
                        <span class="stat">⏱️ <span class="val">${d.time}</span></span>
                    </div>
                    <div class="spots">${d.spots.map(s => `<span class="spot-tag">${s}</span>`).join('')}</div>
                    <span class="hotel-badge">🏨 ${d.hotel}</span>
                    ${noteHtml}
                </div>
            </div>`;
        }

        render();
    </script>
</body>
</html>
